backend:
  name: git-gateway
  branch: main

media_folder: "files/uploads"
public_folder: "/files/uploads"

locale: "ko"

collections:
  - name: "archive"
    label: "작업 아카이브"
    files:
      - file: "content/data.json"
        label: "전체 구조 관리"
        name: "data"
        fields:
          - { label: "사이트 제목", name: "siteTitle", widget: "string" }
          - { label: "사이트 설명", name: "siteDesc", widget: "text" }
          - label: "폴더 트리"
            name: "root"
            widget: "object"
            fields:
              - { label: "ID", name: "id", widget: "hidden", default: "root" }
              - { label: "제목", name: "title", widget: "hidden", default: "전체" }
              - label: "최상위 항목"
                name: "children"
                widget: "list"
                types:
                  - label: "폴더"
                    name: "folder"
                    widget: "object"
                    summary: "📁 {{fields.title}}"
                    fields:
                      - { label: "ID (영문, 하이픈만)", name: "id", widget: "string" }
                      - { label: "폴더 이름", name: "title", widget: "string" }
                      - { label: "설명", name: "desc", widget: "text", required: false }
                      - label: "하위 항목"
                        name: "children"
                        widget: "list"
                        required: false
                        types:
                          - label: "폴더"
                            name: "folder"
                            widget: "object"
                            summary: "📁 {{fields.title}}"
                            fields:
                              - { label: "ID (영문, 하이픈만)", name: "id", widget: "string" }
                              - { label: "폴더 이름", name: "title", widget: "string" }
                              - { label: "설명", name: "desc", widget: "text", required: false }
                              - label: "하위 항목"
                                name: "children"
                                widget: "list"
                                required: false
                                types:
                                  - label: "폴더"
                                    name: "folder"
                                    widget: "object"
                                    summary: "📁 {{fields.title}}"
                                    fields:
                                      - { label: "ID (영문, 하이픈만)", name: "id", widget: "string" }
                                      - { label: "폴더 이름", name: "title", widget: "string" }
                                      - { label: "설명", name: "desc", widget: "text", required: false }
                                      - label: "하위 항목"
                                        name: "children"
                                        widget: "list"
                                        required: false
                                        types:
                                          - label: "폴더"
                                            name: "folder"
                                            widget: "object"
                                            summary: "📁 {{fields.title}}"
                                            fields:
                                              - { label: "ID (영문, 하이픈만)", name: "id", widget: "string" }
                                              - { label: "폴더 이름", name: "title", widget: "string" }
                                              - { label: "설명", name: "desc", widget: "text", required: false }
                                              - label: "자료"
                                                name: "children"
                                                widget: "list"
                                                required: false
                                                types:
                                                  - label: "자료"
                                                    name: "file"
                                                    widget: "object"
                                                    summary: "📄 {{fields.name}}"
                                                    fields:
                                                      - { label: "자료 이름", name: "name", widget: "string" }
                                                      - { label: "설명", name: "desc", widget: "text", required: false }
                                                      - { label: "파일 업로드", name: "file", widget: "file" }
                                          - label: "자료"
                                            name: "file"
                                            widget: "object"
                                            summary: "📄 {{fields.name}}"
                                            fields:
                                              - { label: "자료 이름", name: "name", widget: "string" }
                                              - { label: "설명", name: "desc", widget: "text", required: false }
                                              - { label: "파일 업로드", name: "file", widget: "file" }
                                  - label: "자료"
                                    name: "file"
                                    widget: "object"
                                    summary: "📄 {{fields.name}}"
                                    fields:
                                      - { label: "자료 이름", name: "name", widget: "string" }
                                      - { label: "설명", name: "desc", widget: "text", required: false }
                                      - { label: "파일 업로드", name: "file", widget: "file" }
                          - label: "자료"
                            name: "file"
                            widget: "object"
                            summary: "📄 {{fields.name}}"
                            fields:
                              - { label: "자료 이름", name: "name", widget: "string" }
                              - { label: "설명", name: "desc", widget: "text", required: false }
                              - { label: "파일 업로드", name: "file", widget: "file" }
                  - label: "자료"
                    name: "file"
                    widget: "object"
                    summary: "📄 {{fields.name}}"
                    fields:
                      - { label: "자료 이름", name: "name", widget: "string" }
                      - { label: "설명", name: "desc", widget: "text", required: false }
                      - { label: "파일 업로드", name: "file", widget: "file" }
