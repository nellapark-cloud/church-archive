backend:
  name: git-gateway
  branch: main

media_folder: "files/uploads"
public_folder: "/files/uploads"

locale: "ko"

collections:
  - name: "categories"
    label: "최상위 폴더"
    label_singular: "폴더"
    folder: "content/categories"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "📁 {{title}}"
    fields:
      - { label: "폴더 이름", name: "title", widget: "string" }
      - { label: "설명", name: "desc", widget: "text", required: false }
      - label: "하위 항목"
        name: "children"
        widget: "list"
        collapsed: true
        required: false
        types:
          - label: "폴더"
            name: "folder"
            widget: "object"
            collapsed: true
            summary: "📁 {{fields.title}}"
            fields:
              - { label: "폴더 이름", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text", required: false }
              - label: "하위 항목"
                name: "children"
                widget: "list"
                collapsed: true
                required: false
                types:
                  - label: "폴더"
                    name: "folder"
                    widget: "object"
                    collapsed: true
                    summary: "📁 {{fields.title}}"
                    fields:
                      - { label: "폴더 이름", name: "title", widget: "string" }
                      - { label: "설명", name: "desc", widget: "text", required: false }
                      - label: "하위 항목"
                        name: "children"
                        widget: "list"
                        collapsed: true
                        required: false
                        types:
                          - label: "폴더"
                            name: "folder"
                            widget: "object"
                            collapsed: true
                            summary: "📁 {{fields.title}}"
                            fields:
                              - { label: "폴더 이름", name: "title", widget: "string" }
                              - { label: "설명", name: "desc", widget: "text", required: false }
                              - label: "자료"
                                name: "children"
                                widget: "list"
                                collapsed: true
                                required: false
                                types:
                                  - label: "자료"
                                    name: "file"
                                    widget: "object"
                                    collapsed: true
                                    summary: "📄 {{fields.name}}"
                                    fields:
                                      - { label: "자료 이름", name: "name", widget: "string" }
                                      - { label: "설명", name: "desc", widget: "text", required: false }
                                      - { label: "파일 업로드", name: "file", widget: "file" }
                          - label: "자료"
                            name: "file"
                            widget: "object"
                            collapsed: true
                            summary: "📄 {{fields.name}}"
                            fields:
                              - { label: "자료 이름", name: "name", widget: "string" }
                              - { label: "설명", name: "desc", widget: "text", required: false }
                              - { label: "파일 업로드", name: "file", widget: "file" }
                  - label: "자료"
                    name: "file"
                    widget: "object"
                    collapsed: true
                    summary: "📄 {{fields.name}}"
                    fields:
                      - { label: "자료 이름", name: "name", widget: "string" }
                      - { label: "설명", name: "desc", widget: "text", required: false }
                      - { label: "파일 업로드", name: "file", widget: "file" }
          - label: "자료"
            name: "file"
            widget: "object"
            collapsed: true
            summary: "📄 {{fields.name}}"
            fields:
              - { label: "자료 이름", name: "name", widget: "string" }
              - { label: "설명", name: "desc", widget: "text", required: false }
              - { label: "파일 업로드", name: "file", widget: "file" }

  - name: "settings"
    label: "사이트 설정"
    files:
      - file: "content/site.json"
        label: "사이트 제목/설명"
        name: "site"
        fields:
          - { label: "사이트 제목", name: "siteTitle", widget: "string" }
          - { label: "사이트 설명", name: "siteDesc", widget: "text" }
