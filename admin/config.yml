backend:
  name: git-gateway
  branch: main

media_folder: "files/uploads"
public_folder: "/files/uploads"

locale: "ko"

collections:
  - name: "archive"
    label: "작업 아카이브"
    files:
      - file: "content/data.json"
        label: "전체 구조 관리"
        name: "data"
        fields:
          - { label: "사이트 제목", name: "siteTitle", widget: "string" }
          - { label: "사이트 설명", name: "siteDesc", widget: "text" }
          - label: "폴더 목록"
            name: "folders"
            widget: "list"
            summary: "{{fields.num}}. {{fields.title}}"
            fields:
              - { label: "폴더 ID (영문, 공백없이, 예: youth-group)", name: "id", widget: "string" }
              - { label: "번호 (예: 06)", name: "num", widget: "string" }
              - { label: "폴더 이름", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - label: "서랍 목록"
                name: "drawers"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "서랍 ID (영문, 공백없이)", name: "id", widget: "string" }
                  - { label: "서랍 이름", name: "title", widget: "string" }
                  - { label: "설명", name: "desc", widget: "text" }
                  - label: "자료 목록"
                    name: "files"
                    widget: "list"
                    summary: "{{fields.name}}"
                    fields:
                      - { label: "자료 이름", name: "name", widget: "string" }
                      - { label: "설명 (선택)", name: "desc", widget: "text", required: false }
                      - { label: "파일 업로드", name: "file", widget: "file" }
