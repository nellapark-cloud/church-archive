<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>은혜교회 · 작업 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <div class="breadcrumb" id="breadcrumb" style="display:none;"></div>

  <header class="hero">
    <div class="eyebrow" id="eyebrow">GRACE CHURCH · WORK ARCHIVE</div>
    <h1 id="page-title">은혜교회 작업 아카이브</h1>
    <p id="page-desc"></p>
    <div class="hero-count" id="hero-count"></div>
  </header>

  <section class="category" style="padding-top:48px;">
    <div class="grid" id="folder-grid"></div>
    <div class="file-list" id="file-list"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      이 폴더 안에는 아직 내용이 없습니다.<br>
      <a href="/admin/">관리 페이지</a>에서 폴더나 자료를 추가해보세요.
    </div>
  </section>

  <footer>
    <strong>안내:</strong> 폴더를 클릭하면 그 안으로 계속 들어갈 수 있습니다. 새 폴더나 자료를 추가하려면
    <a href="/admin/">관리 페이지</a>에서 로그인 후 추가해주세요.
  </footer>
</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

<script>
  function findNode(node, pathIndices) {
    let current = node;
    const trail = [{ title: current.title }];
    for (const idx of pathIndices) {
      const next = (current.children || [])[idx];
      if (!next || next.type !== 'folder') return null;
      current = next;
      trail.push({ title: current.title });
    }
    return { node: current, trail };
  }

  fetch('content/data.json')
    .then(res => res.json())
    .then(data => {
      const params = new URLSearchParams(location.search);
      const pathParam = params.get('path');
      const pathIndices = pathParam ? pathParam.split(',').filter(x => x !== '').map(Number) : [];

      const result = findNode({ title: data.siteTitle, children: data.root.children }, pathIndices);

      if (!result) {
        document.querySelector('.wrap').innerHTML = `
          <div style="padding:80px 0;text-align:center;">
            <p style="font-family:'Noto Serif KR',serif;font-size:20px;margin-bottom:16px;">폴더를 찾을 수 없습니다.</p>
            <a href="index.html" style="color:#A9814E;font-weight:600;">← 처음으로 돌아가기</a>
          </div>`;
        return;
      }

      const { node, trail } = result;
      const isRoot = pathIndices.length === 0;

      document.title = `${isRoot ? data.siteTitle : node.title} · 은혜교회 작업 아카이브`;

      if (!isRoot) {
        const crumb = document.getElementById('breadcrumb');
        crumb.style.display = 'block';
        crumb.innerHTML = trail.map((t, i) => {
          if (i === trail.length - 1) return `<span class="current">${t.title}</span>`;
          const p = pathIndices.slice(0, i).join(',');
          return `<a href="index.html${i === 0 ? '' : '?path=' + encodeURIComponent(p)}">${t.title}</a><span class="sep">/</span>`;
        }).join('');
      }

      document.getElementById('eyebrow').textContent = isRoot ? 'GRACE CHURCH · WORK ARCHIVE' : 'FOLDER';
      document.getElementById('page-title').textContent = isRoot ? data.siteTitle : node.title;
      document.getElementById('page-desc').textContent = isRoot ? data.siteDesc : (node.desc || '');

      const children = node.children || [];
      const folders = children.filter(c => c.type === 'folder');
      const files = children.filter(c => c.type === 'file');

      if (isRoot) {
        let totalFolders = 0, totalFiles = 0;
        const countAll = (n) => {
          (n.children || []).forEach(c => {
            if (c.type === 'folder') { totalFolders++; countAll(c); }
            else { totalFiles++; }
          });
        };
        countAll(data.root);
        document.getElementById('hero-count').innerHTML = `
          <div>${totalFolders}<span>폴더</span></div>
          <div>${totalFiles}<span>자료</span></div>
        `;
      }

      const grid = document.getElementById('folder-grid');
      children.forEach((child, idx) => {
        if (child.type !== 'folder') return;
        const newPath = [...pathIndices, idx].join(',');
        const subCount = (child.children || []).length;
        const a = document.createElement('a');
        a.className = 'card';
        a.href = `index.html?path=${encodeURIComponent(newPath)}`;
        a.innerHTML = `
          <h3 class="card-title">${child.title}</h3>
          <p class="card-desc">${child.desc || ''}</p>
          <div class="card-meta">항목 ${subCount}개 →</div>
        `;
        grid.appendChild(a);
      });

      const list = document.getElementById('file-list');
      files.forEach(file => {
        const row = document.createElement('div');
        row.className = 'file-row';
        row.innerHTML = `
          <div class="file-info">
            <p class="file-name">${file.name}</p>
            <p class="file-desc">${file.desc || ''}</p>
          </div>
          <div class="file-actions">
            <a class="btn btn-view" href="${file.file}" target="_blank">열람</a>
            <a class="btn btn-download" href="${file.file}" download>다운로드</a>
          </div>
        `;
        list.appendChild(row);
      });

      if (folders.length === 0 && files.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
      }
    });
</script>

</body>
</html>
