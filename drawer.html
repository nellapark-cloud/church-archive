<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서랍 · 은혜교회 작업 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <div class="breadcrumb">
    <a href="index.html">전체 폴더</a>
    <span class="sep">/</span>
    <a href="#" id="crumb-folder-link">-</a>
    <span class="sep">/</span>
    <span class="current" id="crumb-drawer">-</span>
  </div>

  <header class="hero" style="padding-top:24px;">
    <div class="eyebrow" id="drawer-eyebrow">DRAWER</div>
    <h1 id="drawer-title">-</h1>
    <p id="drawer-desc"></p>
  </header>

  <section class="category" style="padding-top:48px;">
    <div class="file-list" id="file-list"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      이 서랍에는 아직 넣어둔 자료가 없습니다.<br>
      <a href="/admin/">관리 페이지</a>에서 자료를 추가해보세요.
    </div>
  </section>

  <footer>
    <strong>안내:</strong> "열람"은 새 탭에서 바로 열고, "다운로드"는 파일로 저장합니다.<br>
    이 서랍에 자료를 추가하려면 <a href="/admin/">관리 페이지</a>를 이용하세요.
  </footer>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const folderId = params.get('f');
  const drawerId = params.get('d');

  fetch('content/data.json')
    .then(res => res.json())
    .then(SITE_DATA => {
      const folder = SITE_DATA.folders.find(f => f.id === folderId);
      const drawer = folder ? folder.drawers.find(d => d.id === drawerId) : null;

      if (!folder || !drawer) {
        document.querySelector('.wrap').innerHTML = `
          <div style="padding:80px 0;text-align:center;">
            <p style="font-family:'Noto Serif KR',serif;font-size:20px;margin-bottom:16px;">서랍을 찾을 수 없습니다.</p>
            <a href="index.html" style="color:#A9814E;font-weight:600;">← 전체 폴더로 돌아가기</a>
          </div>`;
        return;
      }

      document.title = `${drawer.title} · 은혜교회 작업 아카이브`;
      document.getElementById('crumb-folder-link').textContent = folder.title;
      document.getElementById('crumb-folder-link').href = `folder.html?f=${encodeURIComponent(folder.id)}`;
      document.getElementById('crumb-drawer').textContent = drawer.title;
      document.getElementById('drawer-eyebrow').textContent = `${folder.title.toUpperCase()} · DRAWER`;
      document.getElementById('drawer-title').textContent = drawer.title;
      document.getElementById('drawer-desc').textContent = drawer.desc;

      const list = document.getElementById('file-list');
      if (drawer.files.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
      } else {
        drawer.files.forEach(file => {
          const row = document.createElement('div');
          row.className = 'file-row';
          row.innerHTML = `
            <div class="file-info">
              <p class="file-name">${file.name}</p>
              <p class="file-desc">${file.desc || ''}</p>
            </div>
            <div class="file-actions">
              <a class="btn btn-view" href="${file.file}" target="_blank">열람</a>
              <a class="btn btn-download" href="${file.file}" download>다운로드</a>
            </div>
          `;
          list.appendChild(row);
        });
      }
    });
</script>

</body>
</html>
